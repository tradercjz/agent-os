name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-17
            cxx: clang++-17
          - os: macos-14
            compiler: appleclang
            cc: clang
            cxx: clang++

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev pkg-config
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang-17 libc++-17-dev libc++abi-17-dev
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install curl sqlite pkg-config

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        run: cd build && ctest --output-on-failure --timeout 120

  sanitizers:
    runs-on: ubuntu-24.04
    name: Sanitizers (ASan + UBSan)

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 libcurl4-openssl-dev libsqlite3-dev pkg-config

      - name: Configure with sanitizers
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: cd build && ctest --output-on-failure --timeout 180

  thread-sanitizer:
    runs-on: ubuntu-24.04
    name: Thread Sanitizer (TSan)

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 libcurl4-openssl-dev libsqlite3-dev pkg-config

      - name: Configure with TSan
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test with TSan
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: cd build && ctest --output-on-failure --timeout 180
