name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev pkg-config
          # DuckDB - download pre-built
          wget -q https://github.com/duckdb/duckdb/releases/download/v1.1.0/libduckdb-linux-amd64.zip
          unzip -q libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/duckdb.hpp /usr/local/include/
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig

      - name: Configure CMake (GCC)
        if: matrix.compiler == 'gcc'
        run: cmake -B build -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Configure CMake (Clang)
        if: matrix.compiler == 'clang'
        run: cmake -B build -DCMAKE_CXX_COMPILER=clang++-17 -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc)

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install curl sqlite duckdb pkg-config

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(sysctl -n hw.ncpu)

  build-no-duckdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev pkg-config

      - name: Configure (no DuckDB)
        run: cmake -B build -DAGENTOS_NO_DUCKDB=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanitizer: [asan, ubsan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev pkg-config
          wget -q https://github.com/duckdb/duckdb/releases/download/v1.1.0/libduckdb-linux-amd64.zip
          unzip -q libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/duckdb.hpp /usr/local/include/
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig

      - name: Configure with ASAN
        if: matrix.sanitizer == 'asan'
        run: cmake -B build -DAGENTOS_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Configure with UBSAN
        if: matrix.sanitizer == 'ubsan'
        run: cmake -B build -DAGENTOS_ENABLE_UBSAN=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure
